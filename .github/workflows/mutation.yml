name: Mutation Testing

# Mutation runs are slow (Stryker re-runs the suite per mutant), so they are
# NOT wired into every push/PR like CI. Instead they run weekly on a schedule
# and on demand via the Actions tab. The job fails when the mutation score
# drops below the `break` threshold configured in stryker.config.json.
on:
  schedule:
    # Mondays 05:23 UTC — offset from the nox remediate cron (06:17) so the
    # scheduled jobs do not contend for runners.
    - cron: '23 5 * * 1'
  workflow_dispatch: {}

# Least-privilege: Stryker only reads the checked-out sources and runs tests.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # `stryker run` exits non-zero when the mutation score is below the
      # configured `break` threshold, so this step is the pass/fail gate.
      - name: Run mutation testing
        run: npm run test:mutation

      - name: Upload mutation report
        # Publish the HTML + JSON reports even when the score is below the
        # break threshold, so a failing run is still diagnosable.
        if: always() && hashFiles('reports/mutation/**') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14
